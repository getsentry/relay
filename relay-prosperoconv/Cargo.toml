[package]
name = "relay-prosperoconv"
authors = ["Sentry <oss@sentry.io>"]
homepage = "https://getsentry.github.io/relay/"
repository = "https://github.com/getsentry/relay"
version = "26.7.1"
edition = "2024"
license-file = "../LICENSE.md"
publish = false

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(sentry)'] }

[dependencies]
lz4_flex = ">= 0.11.6, < 0.14"
minidump-writer = ">= 0.11, < 0.13"
object = { version = ">= 0.36, < 0.40", default-features = false, features = ["read_core", "elf", "std"] }
rmpv = "1.3.0"
tracing = { workspace = true }
watto = "0.2.0"

[build-dependencies]
anyhow = { workspace = true }
dircpy = { workspace = true }
tempfile = { workspace = true }
